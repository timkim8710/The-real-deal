<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - The Real Deal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="signin-body">

    <div class="signin-container">
        <h1 class="logo">The Real Deal</h1>
        <p class="subtitle">Log in to see what's real.</p>

        <form class="signin-form">
            <input type="text" placeholder="Phone number, username, or email" required>
            <input type="password" placeholder="Password" required>
            <a href="index.html" class="login-btn">Log In</a>
        </form>

        <div class="divider"><span>OR</span></div>
        <button class="fb-login">Log in with Facebook</button>
        <a href="#" class="forgot-password">Forgot password?</a>
    </div>

    <div class="signup-box">
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>

</body>
</html>
