<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - The Real Deal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="signin-body">

    <div class="signin-container">
        <h1 class="logo">The Real Deal</h1>
        <p class="subtitle">Sign up to see photos and videos from your friends.</p>

        <form class="signin-form">
            <input type="text" placeholder="Mobile Number or Email" required>
            <input type="text" placeholder="Full Name" required>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            
            <p style="font-size: 0.7rem; color: #8e8e8e; margin: 10px 0;">
                By signing up, you agree to our Terms, Data Policy and Cookies Policy.
            </p>

            <a href="index.html" class="login-btn">Sign Up</a>
        </form>
    </div>

    <div class="signup-box">
        <p>Have an account? <a href="signin.html">Log in</a></p>
    </div>

</body>
</html>
